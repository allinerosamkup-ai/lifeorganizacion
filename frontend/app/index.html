<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Airia Flow</title>
  <meta name="description" content="Produtividade feminina baseada no seu ciclo menstrual" />
  <meta name="theme-color" content="#f97316" />

  <!-- PWA: iOS (Apple) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Airia Flow" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

  <!-- iOS Splash screens -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/splash-1290x2796.png" />
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/splash-1179x2556.png" />
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/splash-1170x2532.png" />
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
    href="/icons/splash-1125x2436.png" />
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)"
    href="/icons/splash-828x1792.png" />
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
    href="/icons/splash-750x1334.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96x96.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Airia Flow" />
  <meta property="og:description" content="Produtividade feminina baseada no seu ciclo menstrual" />
  <meta property="og:image" content="/icons/icon-512x512.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
</body>

</html>
