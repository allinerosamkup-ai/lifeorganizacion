<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding Energy Map</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;family=Nunito+Sans:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#E09F9F", // A soft muted rose/salmon, strong enough for buttons but gentle
                        secondary: "#FDF2F0", // Very light pink background
                        "background-light": "#FFF5F2", // Warm creamy pink
                        "background-dark": "#2D2426", // Deep brownish charcoal for dark mode
                        "card-light": "#FFFFFF",
                        "card-dark": "#3E3235",
                        "text-main-light": "#4A3B3E",
                        "text-main-dark": "#EBE3E4",
                        "text-sub-light": "#8C7B7E",
                        "text-sub-dark": "#BDB3B5",
                        "chip-drains": "#FEE2E2", // Light red/pink for draining
                        "chip-recharges": "#DCFCE7", // Light green for recharging (implied context) or soft blue
                        "accent-purple": "#D8B4E2",
                    },
                    fontFamily: {
                        display: ["Playfair Display", "serif"],
                        body: ["Nunito Sans", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': "1.5rem",
                        '2xl': "2rem",
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(224, 159, 159, 0.15)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.05)',
                    }
                },
            },
        };
    </script>
<style>input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #E09F9F;
            cursor: pointer;
            margin-top: -10px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #E5E7EB;
            border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #4B5563;
        }.text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #4A3B3E, #8C7B7E);
        }
        .dark .text-gradient {
            background-image: linear-gradient(to right, #EBE3E4, #BDB3B5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark font-body antialiased transition-colors duration-300">
<div class="max-w-md mx-auto min-h-screen relative pb-24">
<div class="h-12 w-full flex justify-between items-center px-6 pt-2">
<span class="text-xs font-semibold opacity-70">9:41</span>
<div class="flex gap-1.5">
<span class="material-symbols-rounded text-sm opacity-70">signal_cellular_alt</span>
<span class="material-symbols-rounded text-sm opacity-70">wifi</span>
<span class="material-symbols-rounded text-sm opacity-70">battery_full</span>
</div>
</div>
<div class="px-6 mt-2 mb-6">
<div class="flex gap-2 h-1.5 w-full">
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
<div class="flex-1 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
<div class="flex-1 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
<div class="flex-1 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
<div class="flex-1 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
<div class="flex-1 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
</div>
</div>
<header class="px-6 mb-8 text-center">
<p class="text-sm font-semibold tracking-widest text-primary uppercase mb-2">Mapa de Energia</p>
<h1 class="font-display text-3xl font-medium leading-tight text-gradient">
                Como <span class="italic">você</span> gasta energia?
            </h1>
<p class="mt-3 text-text-sub-light dark:text-text-sub-dark text-sm leading-relaxed">
                Entender seus padrões é o primeiro passo para respeitar seu ritmo biológico.
            </p>
</header>
<main class="px-6 space-y-8">
<section>
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-rounded text-primary">battery_alert</span>
<h2 class="font-display text-xl text-text-main-light dark:text-text-main-dark">O que drena MAIS?</h2>
</div>
<div class="flex flex-wrap gap-3">
<button class="px-4 py-2.5 rounded-2xl bg-primary text-white text-sm font-medium shadow-soft transition transform active:scale-95 flex items-center gap-2 border border-primary">
<span>Reuniões Sociais</span>
<span class="material-symbols-rounded text-sm">check</span>
</button>
<button class="px-4 py-2.5 rounded-2xl bg-white dark:bg-card-dark border border-gray-100 dark:border-gray-700 text-text-sub-light dark:text-text-sub-dark text-sm font-medium shadow-sm hover:shadow-md transition transform active:scale-95">
                        Falta de Sono
                    </button>
<button class="px-4 py-2.5 rounded-2xl bg-white dark:bg-card-dark border border-gray-100 dark:border-gray-700 text-text-sub-light dark:text-text-sub-dark text-sm font-medium shadow-sm hover:shadow-md transition transform active:scale-95">
                        Barulho Excessivo
                    </button>
<button class="px-4 py-2.5 rounded-2xl bg-primary text-white text-sm font-medium shadow-soft transition transform active:scale-95 flex items-center gap-2 border border-primary">
<span>Multitasking</span>
<span class="material-symbols-rounded text-sm">check</span>
</button>
<button class="px-4 py-2.5 rounded-2xl bg-white dark:bg-card-dark border border-gray-100 dark:border-gray-700 text-text-sub-light dark:text-text-sub-dark text-sm font-medium shadow-sm hover:shadow-md transition transform active:scale-95">
                        Conflitos
                    </button>
</div>
</section>
<section>
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-rounded text-accent-purple">battery_charging_full</span>
<h2 class="font-display text-xl text-text-main-light dark:text-text-main-dark">O que recarrega?</h2>
</div>
<div class="flex flex-wrap gap-3">
<button class="px-4 py-2.5 rounded-2xl bg-white dark:bg-card-dark border border-gray-100 dark:border-gray-700 text-text-sub-light dark:text-text-sub-dark text-sm font-medium shadow-sm hover:shadow-md transition transform active:scale-95">
                        Leitura
                    </button>
<button class="px-4 py-2.5 rounded-2xl bg-accent-purple/20 dark:bg-accent-purple/30 text-accent-purple dark:text-purple-200 text-sm font-medium shadow-sm border border-accent-purple/30 transition transform active:scale-95 flex items-center gap-2">
<span>Natureza</span>
<span class="material-symbols-rounded text-sm">spa</span>
</button>
<button class="px-4 py-2.5 rounded-2xl bg-white dark:bg-card-dark border border-gray-100 dark:border-gray-700 text-text-sub-light dark:text-text-sub-dark text-sm font-medium shadow-sm hover:shadow-md transition transform active:scale-95">
                        Silêncio
                    </button>
<button class="px-4 py-2.5 rounded-2xl bg-white dark:bg-card-dark border border-gray-100 dark:border-gray-700 text-text-sub-light dark:text-text-sub-dark text-sm font-medium shadow-sm hover:shadow-md transition transform active:scale-95">
                        Yoga
                    </button>
<button class="px-4 py-2.5 rounded-2xl bg-accent-purple/20 dark:bg-accent-purple/30 text-accent-purple dark:text-purple-200 text-sm font-medium shadow-sm border border-accent-purple/30 transition transform active:scale-95 flex items-center gap-2">
<span>Tempo Sozinha</span>
<span class="material-symbols-rounded text-sm">spa</span>
</button>
</div>
</section>
<section class="bg-white dark:bg-card-dark rounded-3xl p-6 shadow-sm border border-gray-50 dark:border-gray-700">
<div class="flex justify-between items-center mb-4">
<h3 class="font-display text-lg text-text-main-light dark:text-text-main-dark">Nível de Foco (Dia Ideal)</h3>
<span class="text-primary font-bold text-lg">70%</span>
</div>
<div class="relative w-full h-8 flex items-center">
<input class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-600 focus:outline-none focus:ring-0" max="100" min="0" type="range" value="70"/>
</div>
<div class="flex justify-between text-xs text-text-sub-light dark:text-text-sub-dark mt-2 font-medium uppercase tracking-wider">
<span>Relaxado</span>
<span>Profundo</span>
</div>
</section>
</main>
<div class="fixed bottom-8 left-0 right-0 px-6 flex justify-between items-center z-20">
<button class="text-text-sub-light dark:text-text-sub-dark font-medium text-sm hover:text-primary transition-colors">
                Pular
            </button>
<button class="bg-primary text-white h-14 w-14 rounded-full flex items-center justify-center shadow-soft hover:shadow-lg transform transition active:scale-90">
<span class="material-symbols-rounded text-2xl">arrow_forward</span>
</button>
</div>
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0 overflow-hidden">
<div class="absolute -top-20 -right-20 w-64 h-64 bg-primary rounded-full mix-blend-multiply filter blur-3xl opacity-10 dark:opacity-20 animate-pulse"></div>
<div class="absolute top-1/2 -left-20 w-80 h-80 bg-accent-purple rounded-full mix-blend-multiply filter blur-3xl opacity-10 dark:opacity-10"></div>
</div>
</div>

</body></html>
