<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Detailed Check-in Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#D8A7B1", // Soft dusty rose
                        secondary: "#FAE1DD", // Very light pink
                        accent: "#C6DEF1", // Pastel blue
                        highlight: "#FBC4AB", // Pastel orange/peach
                        "background-light": "#FFF5F5", // Very pale pink/cream for light mode
                        "background-dark": "#2D2428", // Deep warm brownish-grey for dark mode
                        "card-light": "#FFFFFF",
                        "card-dark": "#3D3236",
                        "text-light": "#5D4037",
                        "text-dark": "#E6D5D9",
                    },
                    fontFamily: {
                        display: ["Playfair Display", "serif"],
                        body: ["Nunito", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': '1.5rem',
                        '2xl': '2rem',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(216, 167, 177, 0.25)',
                        'soft-dark': '0 4px 20px -2px rgba(0, 0, 0, 0.4)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.03)',
                    }
                },
            },
        };
    </script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&amp;family=Playfair+Display:ital,wght@0,600;0,700;1,500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<style>input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #D8A7B1;
            cursor: pointer;
            margin-top: -10px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #FAE1DD;
            border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: #5D4D53;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .dark .glass-panel {
            background: rgba(61, 50, 54, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }.no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;scrollbar-width: none;}
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-body text-text-light dark:text-text-dark antialiased transition-colors duration-300">
<div class="max-w-md mx-auto min-h-screen relative overflow-hidden pb-24">
<header class="px-6 pt-12 pb-4 flex items-center justify-between sticky top-0 z-10 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-sm">
<button class="p-2 rounded-full hover:bg-secondary/50 dark:hover:bg-card-dark transition-colors text-primary">
<span class="material-icons-round text-3xl">chevron_left</span>
</button>
<h1 class="font-display text-2xl font-bold text-gray-800 dark:text-gray-100">Daily Check-in</h1>
<button class="p-2 rounded-full hover:bg-secondary/50 dark:hover:bg-card-dark transition-colors text-primary">
<span class="material-icons-round">calendar_today</span>
</button>
</header>
<main class="px-6 space-y-6">
<div class="text-center mb-6">
<p class="text-sm font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500">October 24, Tuesday</p>
<div class="inline-flex items-center gap-2 mt-2 px-4 py-1.5 rounded-full bg-secondary dark:bg-card-dark border border-primary/20 dark:border-primary/10">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-xs font-bold text-gray-700 dark:text-gray-200">Follicular Phase • Day 8</span>
</div>
</div>
<section class="bg-card-light dark:bg-card-dark rounded-2xl p-6 shadow-soft dark:shadow-soft-dark border border-white/50 dark:border-white/5">
<div class="flex items-center justify-between mb-4">
<h2 class="font-display text-lg font-semibold flex items-center gap-2">
<span class="material-icons-round text-primary text-xl">bolt</span>
                        Energy Level
                    </h2>
<span class="text-2xl font-bold text-primary" id="energy-val">7</span>
</div>
<div class="relative pt-6 pb-2">
<input class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700" max="10" min="1" oninput="document.getElementById('energy-val').innerText = this.value" type="range" value="7"/>
<div class="flex justify-between mt-2 text-xs text-gray-400 font-semibold px-1">
<span>Low</span>
<span>High</span>
</div>
</div>
<div class="flex justify-between mt-4 px-2">
<button class="text-2xl opacity-50 hover:opacity-100 transition-opacity transform hover:scale-110">💤</button>
<button class="text-2xl opacity-50 hover:opacity-100 transition-opacity transform hover:scale-110">🥱</button>
<button class="text-2xl opacity-50 hover:opacity-100 transition-opacity transform hover:scale-110">🙂</button>
<button class="text-2xl opacity-100 transform scale-125 drop-shadow-md">⚡</button>
<button class="text-2xl opacity-50 hover:opacity-100 transition-opacity transform hover:scale-110">🚀</button>
</div>
</section>
<section class="bg-card-light dark:bg-card-dark rounded-2xl p-6 shadow-soft dark:shadow-soft-dark border border-white/50 dark:border-white/5">
<h2 class="font-display text-lg font-semibold mb-4 flex items-center gap-2">
<span class="material-icons-round text-highlight text-xl">mood</span>
                    Current Mood
                </h2>
<div class="grid grid-cols-4 gap-4">
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-2xl bg-highlight/20 border-2 border-highlight flex items-center justify-center text-2xl shadow-sm transition-all">
                            😊
                        </div>
<span class="text-xs font-semibold text-highlight">Happy</span>
</button>
<button class="flex flex-col items-center gap-2 group opacity-60 hover:opacity-100 transition-opacity">
<div class="w-14 h-14 rounded-2xl bg-gray-50 dark:bg-white/5 border-2 border-transparent group-hover:bg-secondary dark:group-hover:bg-white/10 flex items-center justify-center text-2xl transition-all">
                            😔
                        </div>
<span class="text-xs text-gray-500 dark:text-gray-400">Sad</span>
</button>
<button class="flex flex-col items-center gap-2 group opacity-60 hover:opacity-100 transition-opacity">
<div class="w-14 h-14 rounded-2xl bg-gray-50 dark:bg-white/5 border-2 border-transparent group-hover:bg-secondary dark:group-hover:bg-white/10 flex items-center justify-center text-2xl transition-all">
                            😰
                        </div>
<span class="text-xs text-gray-500 dark:text-gray-400">Anxious</span>
</button>
<button class="flex flex-col items-center gap-2 group opacity-60 hover:opacity-100 transition-opacity">
<div class="w-14 h-14 rounded-2xl bg-gray-50 dark:bg-white/5 border-2 border-transparent group-hover:bg-secondary dark:group-hover:bg-white/10 flex items-center justify-center text-2xl transition-all">
                            😌
                        </div>
<span class="text-xs text-gray-500 dark:text-gray-400">Calm</span>
</button>
<button class="flex flex-col items-center gap-2 group opacity-60 hover:opacity-100 transition-opacity">
<div class="w-14 h-14 rounded-2xl bg-gray-50 dark:bg-white/5 border-2 border-transparent group-hover:bg-secondary dark:group-hover:bg-white/10 flex items-center justify-center text-2xl transition-all">
                            😤
                        </div>
<span class="text-xs text-gray-500 dark:text-gray-400">Irritated</span>
</button>
<button class="flex flex-col items-center gap-2 group opacity-60 hover:opacity-100 transition-opacity">
<div class="w-14 h-14 rounded-2xl bg-gray-50 dark:bg-white/5 border-2 border-transparent group-hover:bg-secondary dark:group-hover:bg-white/10 flex items-center justify-center text-2xl transition-all">
                            😴
                        </div>
<span class="text-xs text-gray-500 dark:text-gray-400">Tired</span>
</button>
<button class="flex flex-col items-center gap-2 group opacity-60 hover:opacity-100 transition-opacity">
<div class="w-14 h-14 rounded-2xl bg-gray-50 dark:bg-white/5 border-2 border-transparent group-hover:bg-secondary dark:group-hover:bg-white/10 flex items-center justify-center text-2xl transition-all">
                            ✨
                        </div>
<span class="text-xs text-gray-500 dark:text-gray-400">Inspired</span>
</button>
<button class="flex flex-col items-center gap-2 group opacity-60 hover:opacity-100 transition-opacity">
<div class="w-14 h-14 rounded-2xl bg-gray-50 dark:bg-white/5 border-2 border-transparent group-hover:bg-secondary dark:group-hover:bg-white/10 flex items-center justify-center text-2xl transition-all">
                            🤯
                        </div>
<span class="text-xs text-gray-500 dark:text-gray-400">Overwhelmed</span>
</button>
</div>
</section>
<section class="bg-card-light dark:bg-card-dark rounded-2xl p-6 shadow-soft dark:shadow-soft-dark border border-white/50 dark:border-white/5 flex items-center justify-between">
<div>
<h2 class="font-display text-lg font-semibold flex items-center gap-2 mb-1">
<span class="material-icons-round text-accent text-xl">bedtime</span>
                        Sleep
                    </h2>
<p class="text-xs text-gray-500 dark:text-gray-400">Hours slept last night</p>
</div>
<div class="flex items-center gap-3 bg-background-light dark:bg-background-dark px-4 py-2 rounded-xl shadow-inner-soft">
<button class="w-8 h-8 rounded-full bg-white dark:bg-white/10 shadow-sm flex items-center justify-center text-primary font-bold hover:bg-secondary transition-colors">-</button>
<span class="text-xl font-bold font-display w-12 text-center">7.5</span>
<button class="w-8 h-8 rounded-full bg-white dark:bg-white/10 shadow-sm flex items-center justify-center text-primary font-bold hover:bg-secondary transition-colors">+</button>
</div>
</section>
<section class="bg-card-light dark:bg-card-dark rounded-2xl p-6 shadow-soft dark:shadow-soft-dark border border-white/50 dark:border-white/5">
<h2 class="font-display text-lg font-semibold mb-4 flex items-center gap-2">
<span class="material-icons-round text-primary text-xl">spa</span>
                    Physical Symptoms
                </h2>
<div class="flex flex-wrap gap-2">
<label class="cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-xl bg-gray-50 dark:bg-white/5 text-sm font-medium text-gray-600 dark:text-gray-300 peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:border-primary border border-transparent transition-all">
                            Bloating
                        </div>
</label>
<label class="cursor-pointer group">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-xl bg-gray-50 dark:bg-white/5 text-sm font-medium text-gray-600 dark:text-gray-300 peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:border-primary/30 border border-transparent transition-all">
                            Headache
                        </div>
</label>
<label class="cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-xl bg-gray-50 dark:bg-white/5 text-sm font-medium text-gray-600 dark:text-gray-300 peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:border-primary border border-transparent transition-all">
                            Cramps
                        </div>
</label>
<label class="cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-xl bg-gray-50 dark:bg-white/5 text-sm font-medium text-gray-600 dark:text-gray-300 peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:border-primary border border-transparent transition-all">
                            Back Pain
                        </div>
</label>
<label class="cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-xl bg-gray-50 dark:bg-white/5 text-sm font-medium text-gray-600 dark:text-gray-300 peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:border-primary border border-transparent transition-all">
                            Acne
                        </div>
</label>
<label class="cursor-pointer group">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-xl bg-gray-50 dark:bg-white/5 text-sm font-medium text-gray-600 dark:text-gray-300 peer-checked:bg-primary/20 peer-checked:text-primary peer-checked:border-primary border border-transparent transition-all">
                            Cravings
                        </div>
</label>
</div>
</section>
<section class="bg-card-light dark:bg-card-dark rounded-2xl p-6 shadow-soft dark:shadow-soft-dark border border-white/50 dark:border-white/5">
<div class="flex items-center justify-between mb-4">
<h2 class="font-display text-lg font-semibold flex items-center gap-2">
<span class="material-icons-round text-red-300 text-xl">psychology</span>
                        Stress Level
                    </h2>
<span class="text-sm px-3 py-1 rounded-full bg-secondary dark:bg-white/10 text-primary font-bold">Medium</span>
</div>
<div class="relative h-4 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
<div class="absolute top-0 left-0 h-full w-1/3 bg-green-200"></div>
<div class="absolute top-0 left-1/3 h-full w-1/3 bg-yellow-200"></div>
<div class="absolute top-0 left-2/3 h-full w-1/3 bg-red-200"></div>
<div class="absolute top-0 h-full w-4 bg-white border-2 border-gray-300 rounded-full shadow-md transform -translate-x-1/2" style="left: 45%;"></div>
</div>
<div class="flex justify-between mt-2 text-xs text-gray-400 font-semibold">
<span>Zen</span>
<span>Manageable</span>
<span>Panicking</span>
</div>
</section>
<section class="bg-card-light dark:bg-card-dark rounded-2xl p-6 shadow-soft dark:shadow-soft-dark border border-white/50 dark:border-white/5">
<h2 class="font-display text-lg font-semibold mb-4 flex items-center gap-2">
<span class="material-icons-round text-gray-400 text-xl">edit</span>
                    Journal Notes
                </h2>
<textarea class="w-full bg-background-light dark:bg-background-dark border-none rounded-xl p-4 text-sm text-gray-700 dark:text-gray-200 placeholder-gray-400 focus:ring-2 focus:ring-primary/50 resize-none h-24" placeholder="How did you feel today? Any specific triggers?"></textarea>
</section>
</main>
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark pointer-events-none flex justify-center">
<button class="w-full max-w-md pointer-events-auto bg-primary hover:bg-primary/90 text-white font-display font-semibold text-lg py-4 rounded-2xl shadow-lg shadow-primary/30 transform transition-transform active:scale-95 flex items-center justify-center gap-2">
                Salvar check-in
                <span class="material-icons-round text-xl">check_circle</span>
</button>
</div>
</div>

</body></html>
