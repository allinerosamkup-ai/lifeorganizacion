<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HRV Breathing Guide</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#D980FA", // Warm Orchid/Pink for the breathing bar
                        secondary: "#FDA7DF", // Soft pink accent
                        "background-light": "#FFF0F5", // Very pale lavender blush for light mode base
                        "background-dark": "#1F1A24", // Deep soft purple/charcoal for dark immersive mode
                        "card-light": "#FFFFFF",
                        "card-dark": "#2D2640",
                        "text-light": "#4A4A4A",
                        "text-dark": "#E0E0E0",
                    },
                    fontFamily: {
                        sans: ['"DM Sans"', 'sans-serif'],
                        display: ['"Playfair Display"', 'serif'],
                    },
                    animation: {
                        'breathe-vertical': 'breatheVertical 10s infinite ease-in-out',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        breatheVertical: {
                            '0%, 100%': { height: '10%' },
                            '40%': { height: '80%' }, // Inhale peak
                            '50%': { height: '80%' }, // Hold briefly
                        }
                    }
                },
            },
        };
    </script>
<style>.breathing-bar {
            transition: height 4s ease-in-out;
        }body::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-text-light dark:text-text-dark font-sans h-screen w-full flex flex-col overflow-hidden transition-colors duration-300">
<div class="w-full h-12 flex justify-between items-end px-6 pb-2 z-20">
<span class="text-xs font-medium opacity-80">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-icons-round text-sm opacity-80">signal_cellular_alt</span>
<span class="material-icons-round text-sm opacity-80">wifi</span>
<span class="material-icons-round text-sm opacity-80">battery_full</span>
</div>
</div>
<header class="w-full px-6 py-4 flex justify-between items-center z-20">
<button class="p-2 rounded-full bg-white/10 dark:bg-white/5 backdrop-blur-sm hover:bg-white/20 transition">
<span class="material-icons-round text-2xl text-primary dark:text-secondary">close</span>
</button>
<div class="flex flex-col items-center">
<h1 class="text-sm font-bold uppercase tracking-widest opacity-60 text-primary dark:text-secondary">HRV Check</h1>
</div>
<button class="p-2 rounded-full bg-white/10 dark:bg-white/5 backdrop-blur-sm hover:bg-white/20 transition relative">
<span class="material-icons-round text-2xl text-primary dark:text-secondary">help_outline</span>
</button>
</header>
<main class="flex-1 relative flex flex-col items-center justify-center w-full px-6">
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/4 left-1/4 w-64 h-64 bg-primary/20 rounded-full blur-3xl animate-pulse-slow mix-blend-multiply dark:mix-blend-screen"></div>
<div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-secondary/20 rounded-full blur-3xl animate-pulse-slow animation-delay-1000 mix-blend-multiply dark:mix-blend-screen"></div>
</div>
<div class="absolute top-8 text-center z-10">
<div class="text-5xl font-display italic font-medium text-primary dark:text-secondary drop-shadow-sm">
                00:58
            </div>
<p class="text-sm opacity-60 mt-1">Remaining</p>
</div>
<div class="relative h-[60vh] w-32 bg-purple-100/30 dark:bg-white/5 rounded-full overflow-hidden flex items-end justify-center backdrop-blur-sm border border-white/20 z-10 shadow-inner">
<div class="w-full bg-gradient-to-t from-primary to-secondary dark:from-purple-600 dark:to-primary rounded-b-full animate-breathe-vertical shadow-[0_0_20px_rgba(217,128,250,0.5)]"></div>
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center w-48 pointer-events-none">
<span class="block text-2xl font-display italic text-gray-800 dark:text-white drop-shadow-md transition-opacity duration-1000">
                    Inhale...
                </span>
</div>
</div>
<div class="mt-8 text-center max-w-xs z-10">
<p class="text-lg font-medium">Relax &amp; Breathe</p>
<p class="text-sm opacity-60 mt-2 leading-relaxed">
                Place your finger gently on the camera. Follow the bar: inhale as it rises, exhale as it falls.
            </p>
</div>
</main>
<footer class="w-full px-8 pb-10 pt-4 flex justify-between items-center z-20">
<div class="flex items-center gap-3">
<div class="h-10 w-10 rounded-full bg-rose-100 dark:bg-rose-900/30 flex items-center justify-center text-rose-500 dark:text-rose-300">
<span class="material-icons-round animate-pulse">favorite</span>
</div>
<div>
<p class="text-xs opacity-60 uppercase tracking-wider">Heart Rate</p>
<p class="text-lg font-bold font-display">68 <span class="text-xs font-sans font-normal opacity-60">BPM</span></p>
</div>
</div>
<div class="relative">
<div class="h-16 w-16 rounded-full border-4 border-white/20 dark:border-white/10 overflow-hidden relative shadow-lg">
<div class="absolute inset-0 bg-rose-900 animate-pulse"></div>
<div class="absolute inset-0 bg-gradient-to-br from-rose-500/20 to-transparent"></div>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-icons-round text-white/80 text-2xl drop-shadow-md">fingerprint</span>
</div>
</div>
<div class="absolute -bottom-1 -right-1 bg-emerald-500 border-2 border-background-light dark:border-background-dark h-5 w-5 rounded-full flex items-center justify-center shadow-sm">
<span class="material-icons-round text-[10px] text-white">check</span>
</div>
</div>
</footer>
<div class="fixed top-20 left-4 opacity-20 pointer-events-none animate-bounce" style="animation-duration: 4s;">
<span class="material-icons-round text-xl text-primary">bubble_chart</span>
</div>
<div class="fixed bottom-32 right-8 opacity-20 pointer-events-none animate-bounce" style="animation-duration: 6s;">
<span class="material-icons-round text-xl text-secondary">nights_stay</span>
</div>
</body></html>
